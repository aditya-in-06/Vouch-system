name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Pull Vercel environment
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then env=production; else env=preview; fi
          npx vercel pull --yes --environment=$env --token "$VERCEL_TOKEN" --project-id "$VERCEL_PROJECT_ID" --org-id "$VERCEL_ORG_ID"

      - name: Build (Vercel)
        run: npx vercel build --yes --token "$VERCEL_TOKEN"

      - name: Deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then \
            npx vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"; \
          else \
            npx vercel deploy --prebuilt --yes --token "$VERCEL_TOKEN"; \
          fi
